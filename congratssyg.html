<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Congrats Sayang</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--card-bg: rgba(255, 255, 255, 0.95);
			--text-color: #2f2236;
			--shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
			--white: #ffffff;
			--emoji-font: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: 'Plus Jakarta Sans', sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			background-image: url('asset/background1.jpg');
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			padding: 20px;
		}

		.center-box {
			width: min(92vw, 760px);
			background: var(--card-bg);
			border-radius: 24px;
			box-shadow: var(--shadow);
			padding: 22px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 16px;
		}

		.center-box.password-mode {
			width: min(92vw, 520px);
			background: rgba(23, 12, 28, 0.58);
			backdrop-filter: blur(3px);
			padding: 28px 22px;
			gap: 18px;
		}

		.media-stage {
			width: 100%;
			aspect-ratio: 16 / 9;
			border-radius: 16px;
			overflow: hidden;
			background: #ffffff;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.media-stage img,
		.media-stage video {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}

		.media-stage.is-first {
			aspect-ratio: auto;
			height: clamp(360px, 62vh, 560px);
		}

		.caption {
			min-height: 92px;
			display: block;
			text-align: center;
			color: var(--text-color);
			font-size: clamp(16px, 2.2vw, 22px);
			line-height: 1.45;
			font-weight: 600;
			white-space: pre-line;
			padding: 0 10px;
		}

		.name-glow {
			display: block;
			margin-top: 6px;
			font-weight: 700;
			color: #5e1f6f;
			text-shadow: 0 0 10px rgba(180, 85, 220, 0.75), 0 0 22px rgba(180, 85, 220, 0.45);
		}

		.password-screen {
			width: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 14px;
		}

		.password-screen[hidden] {
			display: none;
		}

		.password-title {
			margin: 0;
			color: var(--white);
			font-family: 'DM Serif Display', serif;
			font-size: clamp(36px, 6vw, 48px);
			font-weight: 700;
			letter-spacing: 0.3px;
		}

		.password-slots {
			width: 100%;
			display: grid;
			grid-template-columns: repeat(8, minmax(0, 1fr));
			gap: 8px;
		}

		.slot {
			height: clamp(44px, 8vw, 54px);
			background: rgba(255, 255, 255, 0.96);
			border-radius: 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: clamp(20px, 3vw, 24px);
			font-weight: 700;
			color: #3c2249;
		}

		.slot.filled {
			color: #7a1128;
		}

		.slot-heart {
			font-family: var(--emoji-font);
			opacity: 0.9;
			animation: pulse-love 1.2s ease-in-out infinite;
		}

		@keyframes pulse-love {
			0% { opacity: 0.35; transform: scale(0.92); }
			50% { opacity: 1; transform: scale(1.08); }
			100% { opacity: 0.35; transform: scale(0.92); }
		}

		.password-hint {
			margin: 0;
			color: var(--white);
			font-size: clamp(14px, 2.6vw, 17px);
			font-weight: 600;
			text-align: center;
		}

		.keypad {
			width: min(100%, 330px);
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 10px;
		}

		.key {
			height: 56px;
			border: 0;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.97);
			color: #2f2236;
			font-family: 'Plus Jakarta Sans', sans-serif;
			font-size: 21px;
			font-weight: 700;
			cursor: pointer;
			transition: transform 0.14s ease, box-shadow 0.14s ease;
		}

		.key:active {
			transform: scale(0.97);
		}

		.key.blank {
			background: transparent;
			box-shadow: none;
			cursor: default;
		}

		.success-popup {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
			background: rgba(20, 10, 24, 0.48);
			z-index: 40;
		}

		.success-popup[hidden] {
			display: none;
		}

		.success-box {
			width: min(92vw, 480px);
			background: rgba(255, 255, 255, 0.98);
			border-radius: 18px;
			padding: 18px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 12px;
			box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
		}

		.success-media {
			width: 100%;
			aspect-ratio: 1 / 1;
			border-radius: 14px;
			overflow: hidden;
			background: #fff;
		}

		.success-media img {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block;
		}

		.success-text {
			margin: 0;
			text-align: center;
			font-size: clamp(18px, 3.1vw, 24px);
			line-height: 1.35;
			font-weight: 700;
			color: #5c1427;
			white-space: pre-line;
		}

		@media (max-width: 600px) {
			.center-box {
				border-radius: 18px;
				padding: 14px;
			}

			.center-box.password-mode {
				padding: 20px 14px;
			}

			.caption {
				min-height: 120px;
				font-size: 16px;
			}

			.password-slots {
				gap: 6px;
			}

			.key {
				height: 50px;
				font-size: 19px;
			}

			.media-stage.is-first {
				height: clamp(260px, 48vh, 420px);
			}
		}
	</style>
</head>
<body>
	<main class="center-box" id="centerBox">
		<section id="storySection">
		<section class="media-stage" id="mediaStage" aria-live="polite"></section>
		<div class="caption" id="captionText"></div>
		</section>
		<section class="password-screen" id="passwordScreen" hidden>
			<h2 class="password-title">Enter Password</h2>
			<div class="password-slots" id="passwordSlots" aria-label="Password slots"></div>
			<p class="password-hint">Hint: Our special day (DD/MM/YYYY)</p>
			<div class="keypad" id="keypad" aria-label="Number keypad">
				<button class="key" type="button" data-key="1">1</button>
				<button class="key" type="button" data-key="2">2</button>
				<button class="key" type="button" data-key="3">3</button>
				<button class="key" type="button" data-key="4">4</button>
				<button class="key" type="button" data-key="5">5</button>
				<button class="key" type="button" data-key="6">6</button>
				<button class="key" type="button" data-key="7">7</button>
				<button class="key" type="button" data-key="8">8</button>
				<button class="key" type="button" data-key="9">9</button>
				<button class="key blank" type="button" aria-hidden="true" tabindex="-1"></button>
				<button class="key" type="button" data-key="0">0</button>
				<button class="key" type="button" data-key="DEL">DEL</button>
			</div>
		</section>
	</main>

	<section class="success-popup" id="successPopup" hidden>
		<div class="success-box">
			<div class="success-media">
				<img id="successImage" src="" alt="Success image">
			</div>
			<p class="success-text" id="successText"></p>
		</div>
	</section>

	<script>
		const sequence = [
			{
				type: 'video',
				src: 'asset/1.mp4',
				text: 'HIiiii SAYANGKU ❤️'
			},
			{
				type: 'image',
				src: 'asset/2.gif',
				text: 'my one and only ayangku yang paling maniss seduniaaaa'
			},
			{
				type: 'image',
				src: 'asset/3.gif',
				textHtml: 'CONGRATSS SAYANGKUUUUUU SELESAI SEMHAS<br>cieeeeee yang bakal ada gelar dibelakang namanya<br><span class="name-glow">Kohan Gunawan, S.T.</span>'
			},
			{
				type: 'image',
				src: 'asset/4.gif',
				durationMs: 10000,
				text: 'untukk ayangkuu yangg pekerjaa keras banget sudah menyelesaikan TAnya sampaii tahap SEMHAS dengan semua lika liku prosesnya ayangg ini'
			},
			{
				type: 'image',
				src: 'asset/5.gif',
				durationMs: 10000,
				text: 'aku punya something nihh untuk ayangku tercinta hihihi tapii ayangku harus membuka passwordnya dulu (harusnya tauu sih passnya apa)'
			}
		];

		const IMAGE_DURATION_MS = 5000;
		const PASSWORD_LENGTH = 8;
		const PASSWORD_VALUE = '07112024';
		const SUCCESS_STEP_DURATION_MS = 3200;
		const SUCCESS_REDIRECT_DELAY_MS = 2200;
		const successSteps = [
			{
				src: 'asset/correct1.gif',
				text: 'ACCESS GRANTED\nasikkkkkk tauu bangett nih passwordnya'
			},
			{
				src: 'asset/correct2.gif',
				text: 'karena sudah bener sini ku kiss dulu 😘'
			}
		];
		const EMPTY_HEART = '❤️';
		const centerBox = document.getElementById('centerBox');
		const storySection = document.getElementById('storySection');
		const mediaStage = document.getElementById('mediaStage');
		const captionText = document.getElementById('captionText');
		const passwordScreen = document.getElementById('passwordScreen');
		const passwordSlots = document.getElementById('passwordSlots');
		const keypad = document.getElementById('keypad');
		const successPopup = document.getElementById('successPopup');
		const successImage = document.getElementById('successImage');
		const successText = document.getElementById('successText');
		let imageTimerId;
		let successTimerId;
		let activeIndex = 0;
		let passwordValue = '';
		let successStepIndex = 0;

		function renderSuccessStep() {
			const step = successSteps[successStepIndex];
			successImage.src = step.src;
			successText.textContent = step.text;

			if (successStepIndex >= successSteps.length - 1) {
				clearTimeout(successTimerId);
				successTimerId = setTimeout(() => {
					window.location.href = 'foryou.html';
				}, SUCCESS_REDIRECT_DELAY_MS);
				return;
			}

			clearTimeout(successTimerId);
			successTimerId = setTimeout(() => {
				successStepIndex += 1;
				renderSuccessStep();
			}, SUCCESS_STEP_DURATION_MS);
		}

		function showSuccessPopup() {
			clearTimeout(successTimerId);
			successStepIndex = 0;
			successPopup.hidden = false;
			renderSuccessStep();
		}

		function renderPasswordSlots() {
			passwordSlots.innerHTML = '';

			for (let i = 0; i < PASSWORD_LENGTH; i += 1) {
				const slot = document.createElement('div');
				slot.className = 'slot';

				if (i < passwordValue.length) {
					slot.classList.add('filled');
					slot.textContent = passwordValue[i];
				} else {
					const heart = document.createElement('span');
					heart.className = 'slot-heart';
					heart.textContent = EMPTY_HEART;
					slot.appendChild(heart);
				}

				passwordSlots.appendChild(slot);
			}
		}

		function showPasswordScreen() {
			clearTimeout(imageTimerId);
			centerBox.classList.add('password-mode');
			storySection.hidden = true;
			mediaStage.innerHTML = '';
			captionText.textContent = '';
			passwordScreen.hidden = false;
			renderPasswordSlots();
		}

		function renderCurrentItem() {
			const item = sequence[activeIndex];
			clearTimeout(imageTimerId);
			mediaStage.innerHTML = '';
			mediaStage.classList.toggle('is-first', activeIndex === 0);

			if (item.textHtml) {
				captionText.innerHTML = item.textHtml;
			} else {
				captionText.textContent = item.text;
			}

			if (item.type === 'video') {
				const video = document.createElement('video');
				video.src = item.src;
				video.autoplay = true;
				video.muted = true;
				video.playsInline = true;
				video.controls = false;

				video.addEventListener('ended', goNext, { once: true });
				video.addEventListener('error', goNext, { once: true });
				mediaStage.appendChild(video);

				video.play().catch(() => {
					goNext();
				});
				return;
			}

			const image = document.createElement('img');
			image.src = item.src;
			image.alt = `Sequence item ${activeIndex + 1}`;
			image.addEventListener('error', goNext, { once: true });
			mediaStage.appendChild(image);
			imageTimerId = setTimeout(goNext, item.durationMs ?? IMAGE_DURATION_MS);
		}

		function goNext() {
			if (activeIndex >= sequence.length - 1) {
				showPasswordScreen();
				return;
			}

			activeIndex += 1;
			renderCurrentItem();
		}

		keypad.addEventListener('click', (event) => {
			const target = event.target;

			if (!(target instanceof HTMLButtonElement)) {
				return;
			}

			const key = target.dataset.key;

			if (!key) {
				return;
			}

			if (key === 'DEL') {
				passwordValue = passwordValue.slice(0, -1);
				renderPasswordSlots();
				return;
			}

			if (passwordValue.length < PASSWORD_LENGTH) {
				passwordValue += key;
				renderPasswordSlots();

				if (passwordValue.length === PASSWORD_LENGTH && passwordValue === PASSWORD_VALUE) {
					showSuccessPopup();
				}
			}
		});

		renderCurrentItem();
	</script>
</body>
</html>
